<!doctype html>
<html lang="zh-Hant">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="robots" content="noindex">
    <title>404 // 缺席學生追蹤</title>
    <style>
        :root { color-scheme: dark; }
        * { box-sizing: border-box; }
        body { margin:0; min-height:100svh; display:grid; place-items:center; background:#050505; color:#d8d8d8; font-family:ui-monospace,Consolas,monospace; }
        main { width:min(92vw,720px); border:1px solid #363636; padding:clamp(24px,6vw,56px); box-shadow:0 0 80px #3008 inset; }
        h1 { margin:0 0 24px; color:#b60017; letter-spacing:.2em; }
        .corrupt { color:#777; text-decoration:line-through; }
        .cursor { animation:blink 1s steps(1) infinite; }
        a { color:#eee; }
        small { display:block; margin-top:42px; color:#454545; }
        @keyframes blink { 50% { opacity:0; } }
    </style>
</head>
<body>
<main>
    <h1>404 // STUDENT NOT FOUND</h1>
    <p>你要求的學生不存在。</p>
    <p class="corrupt">更正：學生存在。不存在的是她的缺席紀錄。</p>
    <p>座位表：11　點名人數：12　可測得體溫：1</p>
    <p>請留在原地。系統正在把這次缺席縫回點名簿。<span class="cursor">█</span></p>
    <p id="return-status">五秒後恢復上一段紀錄。</p>
    <p><a id="return-now" href="./">立即返回剛才的進度</a></p>
    <small>W13-VOID-3F-0A-HEART // 門鎖沒有壞，它只是不願意承認門外有人。</small>
</main>
<script>
    sessionStorage.setItem('ward13_return_from_404', '1');
    let remaining = 5;
    const status = document.getElementById('return-status');
    document.getElementById('return-now')?.addEventListener('click', (event) => {
        event.preventDefault();
        history.back();
    });
    const timer = setInterval(() => {
        remaining -= 1;
        if (status) status.textContent = `${remaining} 秒後恢復上一段紀錄。`;
        if (remaining <= 0) {
            clearInterval(timer);
            history.back();
        }
    }, 1000);
</script>
</body>
</html>
